model_capabilities:
  reasoning:
    enabled: false
    provider: "" # openai | gemini | minimax | zhipu | deepseek | custom
    model: ""
    adapter: "" # openai_compatible | anthropic_compatible | native_api | custom
    endpoint_env: ""
    auth_type: "" # api_key | ak_sk | oauth | custom
    api_key_env: ""
    supports_thinking: null
    supports_tools: null
    notes: ""
  image_input:
    enabled: false
    provider: "" # minimax | deepseek | gemini | openai | custom
    model: ""
    adapter: "" # api | cli | mcp | custom
    endpoint_env: ""
    auth_type: "" # api_key | ak_sk | oauth | custom
    api_key_env: ""
    access_key_env: ""
    secret_key_env: ""
    supported_inputs:
      - clothing_photo
      - outfit_photo
      - multi_item_photo_set
    max_images_per_request: null
    notes: ""
  image_output:
    enabled: false
    provider: "" # openai | gemini | minimax | jimeng | listenhub | custom
    model: ""
    adapter: "" # api | cli | mcp | custom
    endpoint_env: ""
    auth_type: "" # api_key | ak_sk | oauth | custom
    api_key_env: ""
    access_key_env: ""
    secret_key_env: ""
    default_output: outfit_board
    default_aspect_ratio: "9:16"
    fallback_aspect_ratio: "3:4"
    long_image_aspect_ratio: "9:21"
    supported_outputs:
      - outfit_board
      - styling_board
    supports_reference_images: null
    supports_chinese_text_rendering: null
    notes: ""

provider_examples:
  reasoning:
    minimax_m3:
      provider: "minimax"
      model: "MiniMax-M3"
      adapter: "openai_compatible"
      endpoint_env: "MINIMAX_API_BASE"
      auth_type: "api_key"
      api_key_env: "MINIMAX_API_KEY"
      supports_thinking: true
      supports_tools: true
      compatibility:
        - "openai"
        - "anthropic"
      notes: "Preferred MiniMax reasoning model for long-context outfit decisions and structured wardrobe reasoning."
    minimax_m27_highspeed:
      provider: "minimax"
      model: "MiniMax-M2.7-highspeed"
      adapter: "openai_compatible"
      endpoint_env: "MINIMAX_API_BASE"
      auth_type: "api_key"
      api_key_env: "MINIMAX_API_KEY"
      supports_thinking: null
      supports_tools: true
      notes: "Lower-latency MiniMax reasoning fallback when configured."
    zhipu_glm46:
      provider: "zhipu"
      model: "glm-4.6"
      adapter: "native_api"
      endpoint_env: "ZHIPU_API_BASE"
      default_endpoint: "https://open.bigmodel.cn/api/paas/v4/chat/completions"
      auth_type: "api_key"
      api_key_env: "ZHIPU_API_KEY"
      supports_thinking: true
      supports_tools: true
      notes: "Preferred GLM reasoning model for Chinese-first outfit explanations and scenario judgment."
    zhipu_glm45:
      provider: "zhipu"
      model: "glm-4.5"
      adapter: "native_api"
      endpoint_env: "ZHIPU_API_BASE"
      default_endpoint: "https://open.bigmodel.cn/api/paas/v4/chat/completions"
      auth_type: "api_key"
      api_key_env: "ZHIPU_API_KEY"
      supports_thinking: true
      supports_tools: true
      notes: "Agent-oriented GLM fallback with thinking/non-thinking mode support."
    zhipu_glm47_flash:
      provider: "zhipu"
      model: "glm-4.7-flash"
      adapter: "native_api"
      endpoint_env: "ZHIPU_API_BASE"
      default_endpoint: "https://open.bigmodel.cn/api/paas/v4/chat/completions"
      auth_type: "api_key"
      api_key_env: "ZHIPU_API_KEY"
      supports_thinking: null
      supports_tools: true
      notes: "Fast/cost-conscious GLM reasoning option when configured."
  image_output:
    openai:
      provider: "openai"
      model: "gpt-image-2"
      adapter: "api"
      auth_type: "api_key"
      api_key_env: "OPENAI_API_KEY"
      preferred_orientation: "portrait"
      supports_reference_images: true
      supports_chinese_text_rendering: true
    gemini_banana:
      provider: "gemini"
      model: "gemini-3-pro-image"
      model_aliases:
        nano_banana_pro: "gemini-3-pro-image"
        nano_banana_2: "gemini-3.1-flash-image"
        nano_banana: "gemini-2.5-flash-image"
      adapter: "api"
      auth_type: "api_key"
      api_key_env: "GEMINI_API_KEY"
      supports_reference_images: true
      supports_chinese_text_rendering: true
    listenhub_gemini:
      provider: "listenhub"
      underlying_provider: "google"
      model: "gemini-3-pro-image"
      model_aliases:
        nano_banana_pro: "gemini-3-pro-image"
        nano_banana_2: "gemini-3.1-flash-image"
      adapter: "skill_or_api"
      endpoint_env: "LISTENHUB_API_BASE"
      auth_type: "api_key"
      api_key_env: "LISTENHUB_API_KEY"
      api_path: "/v1/images/generation"
      default_aspect_ratio: "9:16"
      default_image_size: "2K"
      supports_reference_images: true
      supports_chinese_text_rendering: true
      reference_image_formats:
        - "fileData"
        - "inlineData"
      notes: "Use ListenHub Image skill/API as the host adapter; send outfit board prompt as prompt."
    listenhub_openai:
      provider: "listenhub"
      underlying_provider: "openai"
      model: "gpt-image-2"
      adapter: "skill_or_api"
      endpoint_env: "LISTENHUB_API_BASE"
      auth_type: "api_key"
      api_key_env: "LISTENHUB_API_KEY"
      api_path: "/v1/images/generation"
      default_aspect_ratio: "9:16"
      default_image_size: "2K"
      supports_reference_images: true
      supports_chinese_text_rendering: true
      reference_image_formats:
        - "fileData"
        - "inlineData"
      notes: "Set ListenHub request provider to openai and model to gpt-image-2."
    minimax_image:
      provider: "minimax"
      model: "image-01"
      adapter: "api"
      endpoint_env: "MINIMAX_API_HOST"
      auth_type: "api_key"
      api_key_env: "MINIMAX_API_KEY"
      api_path: "/v1/image_generation"
      default_aspect_ratio: "9:16"
      preferred_orientation: "portrait"
      supports_reference_images: true
      supports_chinese_text_rendering: null
    jimeng_seedream46:
      provider: "jimeng"
      model: "jimeng_seedream46_cvtob"
      adapter: "api"
      endpoint_env: "JIMENG_VISUAL_ENDPOINT"
      auth_type: "ak_sk"
      access_key_env: "VOLCENGINE_ACCESS_KEY_ID"
      secret_key_env: "VOLCENGINE_SECRET_ACCESS_KEY"
      region: "cn-north-1"
      service: "cv"
      action: "CVSync2AsyncSubmitTask"
      version: "2022-08-31"
      req_key: "jimeng_seedream46_cvtob"
      supports_reference_images: true
      supports_chinese_text_rendering: true
    jimeng_t2i_v30:
      provider: "jimeng"
      model: "jimeng_t2i_v30"
      adapter: "api"
      endpoint_env: "JIMENG_VISUAL_ENDPOINT"
      auth_type: "ak_sk"
      access_key_env: "VOLCENGINE_ACCESS_KEY_ID"
      secret_key_env: "VOLCENGINE_SECRET_ACCESS_KEY"
      region: "cn-north-1"
      service: "cv"
      action: "CVSync2AsyncSubmitTask"
      version: "2022-08-31"
      req_key: "jimeng_t2i_v30"
      supports_reference_images: false
      supports_chinese_text_rendering: true
  image_input:
    openai:
      provider: "openai"
      model: "CONFIGURE_OPENAI_VISION_MODEL_ID"
      adapter: "api"
      auth_type: "api_key"
      api_key_env: "OPENAI_API_KEY"
      supported_file_types:
        - "png"
        - "jpeg"
        - "jpg"
        - "webp"
        - "gif"
    minimax:
      provider: "minimax"
      model: "MiniMax-M3"
      adapter: "api"
      endpoint_env: "MINIMAX_API_HOST"
      auth_type: "api_key"
      api_key_env: "MINIMAX_API_KEY"
      supports_raw_image_input: true
      compatibility:
        - "openai"
        - "anthropic"
    minimax_agent_tool:
      provider: "minimax"
      model: "minimax-vision"
      adapter: "cli_or_mcp"
      auth_type: "api_key"
      api_key_env: "MINIMAX_API_KEY"
      cli_example: "mmx vision describe --image <path-or-url>"
      mcp_tool: "understand_image"
    deepseek:
      provider: "deepseek"
      model: "deepseek-v4-flash"
      adapter: "api"
      endpoint_env: "DEEPSEEK_API_BASE"
      auth_type: "api_key"
      api_key_env: "DEEPSEEK_API_KEY"
      supports_raw_image_input: false
      notes: "Use for reasoning over structured clothing inventories. Do not send raw images unless a separate DeepSeek-compatible vision endpoint is configured."
    deepseek_compatible_vision:
      provider: "deepseek"
      model: "CONFIGURE_DEEPSEEK_COMPATIBLE_VISION_MODEL_ID"
      adapter: "custom"
      endpoint_env: "DEEPSEEK_COMPATIBLE_VISION_BASE"
      auth_type: "api_key"
      api_key_env: "DEEPSEEK_COMPATIBLE_VISION_API_KEY"
      supports_raw_image_input: true
      notes: "Optional host-provided multimodal endpoint, not guaranteed by official DeepSeek API."
    gemini:
      provider: "gemini"
      model: "CONFIGURE_GEMINI_VISION_MODEL_ID"
      adapter: "api"
      auth_type: "api_key"
      api_key_env: "GEMINI_API_KEY"
